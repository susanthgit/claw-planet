name: Integrity check

# Five gates locked in Phase 1.1 Session 5 (Sat 16 May 2026 NZST):
#   1. voice-lint --strict      cheap fail-fast on forbidden marketing words
#                                + Microsoft public-source citation rule.
#                                OUT-of-scope phrase signals are also scanned but
#                                are advisory only (logged, never block).
#                                Inline escape hatch: voice-lint:ignore (same-line annotation).
#   2. audit-blurbs --strict    cheap fail-fast on LEGACY model citations across
#                                5 vendor hubs + 4 product hubs + 3 src/data/*.ts
#                                files. INFO findings never block.
#                                Inline escape hatch: audit-blurbs:ignore (same-line annotation).
#   3. audit-verification       verifies the 5-state verification contract on .mdx frontmatter
#                                (planned · sourced · tried · verified · disputed).
#   4. build:no-search          Astro build without Pagefind (required precondition for
#                                check:links, which depends on dist/).
#   5. check:links              integrity-check.mjs internal-link + claims audit
#                                (depends on dist/ from step 4).
# Cheap gates first so CI fails fast (~10s) on guardrail breaks instead of after a 100s build.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  integrity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Voice lint (strict — forbidden words + Microsoft source rule)
        run: npm run voice-lint:strict

      - name: Audit blurbs (strict — legacy model citations)
        run: npm run audit:blurbs:strict

      - name: Audit verification states
        run: npm run audit:verification

      - name: Build (no Pagefind — precondition for link audit)
        run: npm run build:no-search

      - name: Audit claims + internal links
        # P0a complete (Batch 10) — public launch — threshold ratcheted to 0.
        run: npm run check:links
